name: Android Setup Job

on:
  workflow_call:
    inputs:
      task:
        required: true
        type: string
      upload-coverage:
        required: false
        type: boolean
        default: false
      show-ktlint-errors:
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew

      - name: Run Gradle task
        run: ./gradlew ${{ inputs.task }}

      - name: Upload coverage
        if: inputs.upload-coverage == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

      - name: Show ktlint errors
        if: failure() && inputs.task == 'ktlintCheck'
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-report
          path: app/build/reports/ktlint/