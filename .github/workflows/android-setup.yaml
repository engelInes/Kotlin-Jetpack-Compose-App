name: Android Setup Job

on:
  workflow_call:
    inputs:
      task:
        required: true
        type: string
      show-ktlint-errors:
        required: false
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew

      - name: Run Gradle task
        run: ./gradlew ${{ inputs.task }}

      - name: Show ktlint errors
        if: failure() && inputs.show-ktlint-errors == true
        run: |
          cat app/build/reports/ktlint/ktlintAndroidTestSourceSetCheck/ktlintAndroidTestSourceSetCheck.txt || true