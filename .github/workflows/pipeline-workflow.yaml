name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  build:
    uses: ./.github/workflows/android-setup.yaml
    with:
      task: assembleDebug

  ktlint:
    uses: ./.github/workflows/android-setup.yaml
    with:
      task: ktlintCheck
      show-ktlint-errors: true

  detekt:
    uses: ./.github/workflows/android-setup.yaml
    with:
      task: detekt

  unit-tests:
    uses: ./.github/workflows/android-setup.yaml
    with:
      task: testDebugUnitTest

  report:
    needs: [ build, ktlint, detekt, unit-tests ]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Prepare report
        id: report
        run: |
          echo "BUILD=${{ needs.build.result }}" >> report.txt
          echo "KT=${{ needs.ktlint.result }}" >> report.txt
          echo "DET=${{ needs.detekt.result }}" >> report.txt
          echo "UT=${{ needs.unit-tests.result }}" >> report.txt
          
          echo "RUN_URL=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> report.txt
          
          TEXT=$(awk '{printf("%s\\n", $0)}' report.txt)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post result
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BUILD: ${{ needs.build.result }}
          KT: ${{ needs.ktlint.result }}
          DET: ${{ needs.detekt.result }}
          UT: ${{ needs.unit-tests.result }}
        run: |
          COMMENT_BODY=$(cat <<EOF
          
          Build: $BUILD
          Ktlint: $KT
          Detekt: $DET
          Unit Tests: $UT
          
          See detailed logs: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )
          
          gh pr comment $PR_NUMBER --body "$COMMENT_BODY"

  create-issue:
    needs: [ build, ktlint, detekt, unit-tests ]
    runs-on: ubuntu-latest
    if: |
      always() && 
      github.event_name == 'push' && 
      (needs.build.result != 'success' || needs.ktlint.result != 'success' || needs.detekt.result != 'success' || needs.unit-tests.result != 'success')
    steps:
      - name: Create issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD: ${{ needs.build.result }}
          KT: ${{ needs.ktlint.result }}
          DET: ${{ needs.detekt.result }}
          UT: ${{ needs.unit-tests.result }}
        run: |
          FAILURES=""
          
          if [ "$BUILD" != "success" ]; then
            FAILURES="$FAILURES\n- Build"
          fi
          
          if [ "$KT" != "success" ]; then
            FAILURES="$FAILURES\n- Ktlint"
          fi
          
          if [ "$DET" != "success" ]; then
            FAILURES="$FAILURES\n- Detekt"
          fi
          
          if [ "$UT" != "success" ]; then
            FAILURES="$FAILURES\n- Unit Tests"
          fi
          
          if [ "$FAILURES" != "" ]; then
            gh api repos/${GITHUB_REPOSITORY}/issues \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -f title="Failure on main branch" \
              -f body="Failures detected:$FAILURES\n\nRun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          fi
