name: PR Checks

on:
  pull_request:

jobs:
  build:
    name: build apk
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug