name: Coverage Badge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: chmod +x gradlew

      - name: Run unit tests and generate coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml

  coverage-setup:
    needs: test-and-report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - run: ls -R coverage

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Get coverage
        id: coverage
        run: |
          FILE="coverage/jacocoTestReport.xml"

          COVERED=$(xmllint --xpath "string(//counter[@type='LINE']/@covered)" $FILE)
          MISSED=$(xmllint --xpath "string(//counter[@type='LINE']/@missed)" $FILE)
          
          TOTAL=$((COVERED + MISSED))
          PERCENT=$((100 * COVERED / TOTAL))
          
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Update README badge
        run: |
          PERCENT=${{ steps.coverage.outputs.coverage }}

          if [ "$PERCENT" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$PERCENT" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          
          BADGE="https://img.shields.io/badge/coverage-${PERCENT}%25-${COLOR}"
          sed -i "s|COVERAGE_BADGE|$BADGE|g" README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update coverage badge" || echo "No changes"
          git push