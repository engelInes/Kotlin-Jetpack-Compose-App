name: Coverage Badge

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup jdk
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant permission
        run: chmod +x gradlew

      - name: Run tests with coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport

      - name: Extract coverage
        id: coverage
        run: |
          FILE="app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml"

          COVERED=$(xmllint --xpath "string(//counter[@type='LINE']/@covered)" $FILE)
          MISSED=$(xmllint --xpath "string(//counter[@type='LINE']/@missed)" $FILE)
          
          TOTAL=$((COVERED + MISSED))
          PERCENT=$((100 * COVERED / TOTAL))
          
          echo "coverage=$PERCENT" >> $GITHUB_OUTPUT

      - name: Update README badge
        run: |
          PERCENT=${{ steps.coverage.outputs.coverage }}

          if [ "$PERCENT" -ge 80 ]; then
            COLOR="brightgreen"
          elif [ "$PERCENT" -ge 60 ]; then
            COLOR="yellow"
          else
            COLOR="red"
          fi
          
          BADGE="https://img.shields.io/badge/coverage-${PERCENT}%25-${COLOR}"
          sed -i "s|COVERAGE_BADGE|$BADGE|g" README.md

      - name: Commit updated README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update coverage badge" || echo "No changes"
          git push