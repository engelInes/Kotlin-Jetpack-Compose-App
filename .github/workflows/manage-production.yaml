name: Main to Production

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh pr list \
            --base production \
            --head main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$pr" ]; then
            echo "Creating PR main to production"

            pr_url=$(gh pr create \
              --base production \
              --head main \
              --title "Sync main to production" \
              --body "Hourly sync")

            echo "PR created: $pr_url"
            gh pr merge --auto --squash "$pr_url"

          else
            echo "PR already exists: #$pr"
          fi

      - name: Wait for merge
        run: sleep 20

      - name: Generate tag and release notes
        id: release
        run: |
          git fetch --tags
          last_tag=$(git tag --sort=-v:refname | head -n 1)

          if [ -z "$last_tag" ]; then
              last_tag=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "Last tag: $last_tag"
          commits=$(git log $last_tag..HEAD --pretty=format:"- %s")

          new_tag="v$(date +'%Y.%m.%d.%H%M')"

          echo "tag=$new_tag" >> $GITHUB_OUTPUT
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$commits" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release Tag
        run: |
          git tag ${{ steps.release.outputs.tag }}
          git push origin ${{ steps.release.outputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.release.outputs.tag }} \
            --title "Release ${{ steps.release.outputs.tag }}" \
            --notes "${{ steps.release.outputs.commits }}"
